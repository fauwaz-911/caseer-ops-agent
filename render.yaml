services:
  - type: web
    name: ops-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_DB_ID
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: WORKSPACE_ID
        value: "default"
      - key: MORNING_HOUR
        value: "10"
      - key: MORNING_MINUTE
        value: "0"
      - key: EVENING_HOUR
        value: "18"
      - key: EVENING_MINUTE
        value: "0"
      - key: REMINDER_INTERVAL_MINUTES
        value: "30"
      - key: SCHEDULER_TIMEZONE
        value: "UTC"
      - key: TELEGRAM_MAX_RETRIES
        value: "3"
      - key: TELEGRAM_RETRY_BACKOFF
        value: "2.0"
      - key: LOG_LEVEL
        value: "INFO"
      - key: LOG_DIR
        value: "logs"
      - key: STATE_FILE
        value: "logs/reminder_state.json"
